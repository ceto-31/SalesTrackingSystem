<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Pass the ALLOWED_ORIGIN environment variable into Apache so that
    # mod_headers in .htaccess can reference it as %{ALLOWED_ORIGIN}e
    PassEnv ALLOWED_ORIGIN

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
